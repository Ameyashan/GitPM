<svg width="1584" height="396" viewBox="0 0 1584 396" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="lgrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1B2838" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="lgridFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="white" stop-opacity="0"/>
      <stop offset="0.25" stop-color="white" stop-opacity="0.35"/>
      <stop offset="0.75" stop-color="white" stop-opacity="0.35"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="lgridMask">
      <rect width="1584" height="396" fill="url(#lgridFade)"/>
    </mask>
    <radialGradient id="ltealGlow" cx="792" cy="198" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A7558" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#0A7558" stop-opacity="0"/>
    </radialGradient>
    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0" y1="0" x2="1584" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A7558" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#0A7558" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#0A7558" stop-opacity="1"/>
      <stop offset="0.7" stop-color="#6C5CE7" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#6C5CE7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#0D1B2A"/>

  <!-- Grid -->
  <rect width="1584" height="396" fill="url(#lgrid)" mask="url(#lgridMask)"/>

  <!-- Glow -->
  <ellipse cx="792" cy="198" rx="450" ry="250" fill="url(#ltealGlow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1584" height="2" fill="url(#accentLine)"/>

  <!-- Decorative commit nodes scattered -->
  <g opacity="0.15">
    <line x1="150" y1="0" x2="150" y2="120" stroke="#0A7558" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="150" cy="140" r="4" stroke="#0A7558" stroke-width="1.5" fill="none"/>
    <circle cx="150" cy="140" r="1.5" fill="#0A7558"/>
    <line x1="150" y1="160" x2="150" y2="396" stroke="#0A7558" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g opacity="0.1">
    <line x1="1434" y1="0" x2="1434" y2="220" stroke="#6C5CE7" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="1434" cy="240" r="4" stroke="#6C5CE7" stroke-width="1.5" fill="none"/>
    <circle cx="1434" cy="240" r="1.5" fill="#6C5CE7"/>
    <line x1="1434" y1="260" x2="1434" y2="396" stroke="#6C5CE7" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Logo mark -->
  <line x1="700" y1="118" x2="700" y2="155" stroke="#0A7558" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="700" y1="200" x2="700" y2="237" stroke="#0A7558" stroke-width="3.2" stroke-linecap="round"/>
  <circle cx="700" cy="177" r="16" stroke="#0A7558" stroke-width="3.2"/>
  <circle cx="700" cy="177" r="6.5" fill="#0A7558"/>

  <!-- Wordmark -->
  <text x="734" y="189" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="44" font-weight="700" letter-spacing="-1.3" fill="#F0F2F0">git</text>
  <text x="820" y="189" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="44" font-weight="500" letter-spacing="-1.3" fill="#F0F2F0" opacity="0.55">pm</text>

  <!-- Tagline -->
  <text x="792" y="280" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="400" fill="#7B8FA3" text-anchor="middle" letter-spacing="0.4">The portfolio platform for product managers who build.</text>

  <!-- URL pill -->
  <rect x="732" y="300" width="120" height="30" rx="15" fill="#1B2838" stroke="#0A7558" stroke-width="0.5" opacity="0.8"/>
  <text x="792" y="320" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="500" fill="#0A7558" text-anchor="middle">gitpm.dev</text>
</svg>
